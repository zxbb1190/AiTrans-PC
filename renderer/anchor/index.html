<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AiTrans Anchor</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        user-select: none;
      }

      .anchor-shell {
        width: 68px;
        height: 68px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .anchor {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: transparent;
      }

      .anchor img {
        width: 56px;
        height: 56px;
        object-fit: contain;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="anchor-shell">
      <div id="anchor" class="anchor" title="打开 AiTrans 对话浮窗" aria-label="打开 AiTrans 对话浮窗">
        <img src="../../assets/app-icon.png" alt="AiTrans" />
      </div>
    </div>
    <script src="./anchor.js"></script>
  </body>
</html>
